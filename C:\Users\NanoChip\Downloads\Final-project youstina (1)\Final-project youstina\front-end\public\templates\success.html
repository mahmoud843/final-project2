<!DOCTYPE html>
<html lang="en">
<head>
    <title>Success</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        h1 {
            color: #22c55e;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #38bdf8;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🎉 Order Successful</h1>
    <p>Your order has been placed successfully.</p>
    <a href="/">Back to Home</a>
</div>
<script>
    console.log("cart from success =", localStorage.getItem("cart"));
console.log("purchasedBooks from success =", localStorage.getItem("purchasedBooks"));
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length > 0) {
        const purchased = JSON.parse(localStorage.getItem("purchasedBooks")) || [];

        const newItems = cart.map(item => ({
            ...item,
            date: new Date().toLocaleDateString()
        }));

        localStorage.setItem(
            "purchasedBooks",
            JSON.stringify([...purchased, ...newItems])
        );

        localStorage.removeItem("cart");
    }
</script>
</body>
</html>
