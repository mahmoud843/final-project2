<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء منشور جديد - PAD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.2/ace.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='mysites.css') }}">
</head>
<body>
    <div class="container">
        <div class="main-content">

            <form id="createProjectForm" method="POST" action="{{ url_for('create_project_page') }}">
                <!-- hidden fields للإرسال للباك إند -->
                <input type="hidden" name="post_type" id="post_type_hidden" value="question">
                <input type="hidden" name="title" id="title_hidden">
                <input type="hidden" name="description" id="description_hidden">
                <input type="hidden" name="code_content" id="code_content_hidden">
                <input type="hidden" name="css_content" id="css_content_hidden">
                <input type="hidden" name="js_content" id="js_content_hidden">
                <input type="hidden" name="programming_language" id="programming_language_hidden">

                <!-- الهيدر مع زر الرجوع -->
                <div class="project-header">
                    <h1>✨ إنشاء منشور جديد</h1>
                    <a href="{{ url_for('home_page') }}" class="close-btn">
                        <i class="fa-solid fa-arrow-right"></i>
                    </a>
                </div>

                <!-- اختيار نوع المنشور -->
                <div class="post-type-selector">
                    <button type="button" class="type-btn question active" onclick="switchPostType('question')">
                        <i class="fa-solid fa-question"></i>
                        <span>سؤال</span>
                    </button>
                    <button type="button" class="type-btn project" onclick="switchPostType('project')">
                        <i class="fa-solid fa-diagram-project"></i>
                        <span>مشروع</span>
                    </button>
                    <button type="button" class="type-btn code" onclick="switchPostType('code')">
                        <i class="fa-solid fa-code"></i>
                        <span>كود</span>
                    </button>
                </div>

                <!-- بطاقة المستخدم -->
                <div class="user-card">
                    <img src="{{ url_for('static', filename='images/sia.jpeg') }}" alt="user" class="user-avatar" onerror="this.src='https://via.placeholder.com/60'">
                    <div class="user-info">
                        <h3>{% if session.username %}{{ session.username }}{% else %}أحمد محمد{% endif %}</h3>
                        <p>{% if session.username %}@{{ session.username }}{% else %}@ahmed_dev{% endif %}</p>
                    </div>
                </div>

                <!-- نموذج السؤال -->
                <div id="questionForm" class="post-form active">
                    <div class="question-form">
                        <div class="form-group">
                            <label>عنوان السؤال</label>
                            <input type="text" class="form-control" id="questionTitle" placeholder="مثال: مشكلة في حلقة for في بايثون">
                        </div>

                        <div class="form-group">
                            <label>شرح المشكلة بالتفصيل</label>
                            <textarea class="form-control" id="questionDesc" placeholder="اكتب شرح كامل للمشكلة التي تواجهها..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>الكود (اختياري)</label>
                            <textarea class="form-control" id="questionCode" placeholder="الصق الكود الذي يسبب المشكلة هنا..." style="min-height: 150px; font-family: monospace;"></textarea>
                        </div>

                        <div class="form-group">
                            <label>لغة البرمجة</label>
                            <select class="form-control" id="questionLanguage">
                                <option value="python">Python</option>
                                <option value="javascript">JavaScript</option>
                                <option value="java">Java</option>
                                <option value="cpp">C++</option>
                                <option value="html">HTML/CSS</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- نموذج المشروع -->
                <div id="projectForm" class="post-form">
                    <div class="code-editors">
                        <div class="editor-card">
                            <div class="editor-header html">
                                <i class="fa-brands fa-html5"></i>
                                <span>HTML</span>
                            </div>
                            <div id="html-editor" class="editor-container"></div>
                        </div>

                        <div class="editor-card">
                            <div class="editor-header css">
                                <i class="fa-brands fa-css3-alt"></i>
                                <span>CSS</span>
                            </div>
                            <div id="css-editor" class="editor-container"></div>
                        </div>

                        <div class="editor-card">
                            <div class="editor-header js">
                                <i class="fa-brands fa-js"></i>
                                <span>JavaScript</span>
                            </div>
                            <div id="js-editor" class="editor-container"></div>
                        </div>
                    </div>

                    <div class="preview-section">
                        <div class="preview-header">
                            <h2><i class="fa-solid fa-eye"></i> المعاينة المباشرة</h2>
                            <button type="button" class="run-btn" onclick="runProject()">
                                <i class="fa-solid fa-play"></i>
                                <span>تشغيل</span>
                            </button>
                        </div>
                        <iframe id="preview" class="preview-frame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
                    </div>
                </div>

                <!-- أزرار الإجراءات -->
                <div class="action-buttons">
                    <a href="{{ url_for('home_page') }}" class="btn btn-secondary">
                        <i class="fa-solid fa-times"></i> إلغاء
                    </a>
                    <button type="button" class="btn btn-primary" onclick="publishPost()">
                        <i class="fa-solid fa-rocket"></i> نشر
                    </button>
                </div>
            </form>

        </div>
    </div>

    <script src="{{ url_for('static', filename='mysite.js') }}" defer></script>
</body>
</html>
