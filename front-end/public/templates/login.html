<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PAD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>

    <div class="form-container">
        <form id="loginForm" method="POST" action="{{ url_for('login_page') }}">
            <h2>Login</h2>

            {% if message %}
                <div class="message">{{ message }}</div>
            {% endif %}

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="message2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div>
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" name="email" required placeholder="name@domain.com">
            </div>

            <div>
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit">Sign In</button>

            <div class="signup-message">
                <p>Don't have an account? <a href="{{ url_for('signup_page') }}" id="signupLink">Create one now</a></p>
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
