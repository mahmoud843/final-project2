<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PAD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>
<body>

    <div class="form-container">
        <form id="registrationForm" method="POST" action="{{ url_for('signup_page') }}">
            <h2>Create Account</h2>

            {% if message %}
                <div class="message">{{ message }}</div>
            {% endif %}

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="message2">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div>
                <label for="regUsername">Username</label>
                <input type="text" id="regUsername" name="username" required placeholder="Choose a username">
            </div>

            <div>
                <label for="regEmail">Email Address</label>
                <input type="email" id="regEmail" name="email" required placeholder="name@domain.com">
            </div>

            <div>
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>

            <div>
                <label for="regConfirmPassword">Confirm Password</label>
                <input type="password" id="regConfirmPassword" name="confirm_password" required placeholder="Repeat password">
            </div>

            <div class="row">
                <div class="column-1">
                    <p class="gender">Gender</p>
                    <div class="male-input">
                        <input type="radio" id="male" name="gender" value="male" required>
                        <label class="label-male" for="male">Male</label>
                    </div>
                    <div class="female-input">
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                </div>

                <div class="column-2">
                    <p>Programming Level</p>
                    <div class="beginner">
                        <input type="radio" id="beginner" name="programming" value="beginner" required>
                        <label for="beginner">Beginner</label>
                    </div>
                    <div class="professional">
                        <input type="radio" id="professional" name="programming" value="professional">
                        <label for="professional">Professional</label>
                    </div>
                </div>
            </div>

            <button type="submit">Sign Up</button>

            <div class="login-message">
                <p>Already have an account? <a href="{{ url_for('login_page') }}" id="login">Log In</a></p>
            </div>
        </form>
    </div>

    <script src="{{ url_for('static', filename='signup.js') }}"></script>
</body>
</html>
