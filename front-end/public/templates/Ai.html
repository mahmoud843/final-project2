<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أبو الشات المحلي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: radial-gradient(circle at 0% 0%, #1f2937 0, #020617 55%, #000 100%);
  margin: 0;
  height: 100vh;
}
    .chat-box {
  background: rgba(15, 23, 42, 0.96);
  border-radius: 0; /* نخليها 0 عشان تبقى full screen */
  padding: 60px 20px 20px;
  
  width: 100%;
  height: 100vh;

  max-width: none; /* مهم جداً */
  
  display: flex;
  flex-direction: column;
  position: relative;
  
  border: none;
  backdrop-filter: blur(18px);
}
    .back-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: #e5e7eb;
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      border: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      transition: all 0.25s ease;
      z-index: 20;
      direction: ltr;
    }

    .back-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #334155, #1e293b);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
    }

    .back-btn:active {
      transform: scale(0.98);
    }

    .back-btn i {
      font-size: 14px;
      color: #93c5fd;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      margin-right: 5px;
    }

    .chat-title {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bot-avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 0%, #22c55e, #047857 55%, #022c22 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
    }

    .chat-title-text {
      display: flex;
      flex-direction: column;
      text-align: right;
    }

    .chat-title-text span:first-child {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e5e7eb;
    }

    .chat-title-text span:last-child {
      font-size: 0.78rem;
      color: #9ca3af;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(22, 163, 74, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.4);
      font-size: 0.75rem;
      color: #bbf7d0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.8);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      border-radius: 14px;
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #030712 100%);
      padding: 12px 10px 10px;
      border: 1px solid rgba(55, 65, 81, 0.7);
    }

    .user,
    .bot,
    .error {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 14px;
      max-width: 90%;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 0.92rem;
    }

    .user {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #ecfdf5;
      text-align: right;
      margin-left: auto;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.35);
    }

    .bot {
      background: linear-gradient(135deg, #020617, #111827);
      color: #e5e7eb;
      text-align: right;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(55, 65, 81, 0.8);
    }

    .bot.loading {
      background: transparent;
      border: none;
      box-shadow: none;
      padding-inline: 4px;
    }

    .error {
      background: rgba(127, 29, 29, 0.2);
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.7);
    }

    .input-container {
      display: flex;
      gap: 8px;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(75, 85, 99, 0.9);
      padding: 4px 6px;
      background: radial-gradient(circle at 0 0, rgba(30, 64, 175, 0.3), rgba(15, 23, 42, 0.98));
    }

    input {
      padding: 10px 12px;
      flex: 1;
      border: none;
      border-radius: 999px;
      font-size: 0.95rem;
      outline: none;
      background: transparent;
      color: #e5e7eb;
      min-height: 42px;
    }

    input::placeholder {
      color: #9ca3af;
    }

    button {
      padding: 9px 15px;
      background: radial-gradient(circle at 0 0, #22c55e, #16a34a);
      color: #ecfdf5;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #9ca3af;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes typing {
      0%, 60%, 100% { transform: scale(0.8); opacity: 0.4; }
      30% { transform: scale(1); opacity: 1; }
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="chat-box">
    <a href="{{ url_for('home_page') }}" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i>
      <span>Back to PAD</span>
    </a>

    <div class="chat-header">
      <div class="chat-title">
        <div class="bot-avatar">🤖</div>
        <div class="chat-title-text">
          <span>Pad Ai</span>
          <span>نسخة خفيفة تعمل من جهازك فقط</span>
        </div>
      </div>

      <div class="status-pill">
        <span class="status-dot"></span>
        <span>متصل محلياً</span>
      </div>
    </div>

    <div class="messages" id="chat"></div>

    <div class="input-container">
      <input
        type="text"
        id="message"
        placeholder="اكتب سؤالك أو طلبك هنا..."
        onkeypress="handleKeyPress(event)"
      />
      <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    const knowledgeBase = {
      greetings: [
        "أهلاً وسهلاً بيك ✨ أنا أقدر أساعدك في الأسئلة، الأفكار، والبرمجة.",
        "يا هلا والله! 😄 نورت الشات، قول لي حابب نبدأ في إيه؟",
        "أهلاً بيك 👋 جاهز أساعدك في أي حاجة تحبها – برمجة، معلومات، أو حتى فضفضة خفيفة."
      ],
      farewells: [
        "مع السلامة 👋 كان مبسوط بالدردشة معاك، استناني ترجع تاني.",
        "إلى اللقاء 🌟 لو احتجت أي حاجة أنا مستنيك هنا.",
        "وداعاً حالياً، بس مش نهائياً 😉 تعال في أي وقت."
      ],
      thanks: [
        "العفو 🙏 وجودي الأساسي إني أساعدك.",
        "ولا يهمك ❤️ لو احتجت أي حاجة تانية بس ناديني.",
        "شكراً ليك إنت إنك استخدمت أبو الشات المحلي 🤖."
      ],
      programming: [
        "البرمجة حلوة جدًا 💻، تقدر تسألني عن HTML, CSS, JavaScript, Python وحاجات تانية كتير.",
        "عايز تبدأ منين في البرمجة؟ أساسيات ولا حل مشكلة معينة؟ 😎",
        "أفضل طريقة تتعلم برمجة: جرّب – غلط – عدل – عيد. مفيش مبرمج اتولد محترف 💪."
      ],
      advice: [
        "حاول تتعلم كل يوم ولو معلومة صغيرة 🌱 الاستمرارية أهم من الكمال.",
        "لو حاسس إنك واقف في حتة معينة، خد بريك بسيط وارجع تاني 💆‍♂️.",
        "ركز على هدف واحد في نفس الوقت، هتلاقي تقدمك أسرع بكتير 🚀."
      ],
      weather: [
        "أنا شغال محلي من غير إنترنت حاليًا 🌐، فمش أقدر أجيب حالة الطقس بالظبط، بس أقدر أقولك: خُد معاك جاكيت احتياطاً 😄."
      ],
      jokes: [
        "ليه المبرمج بيحب الليل؟ عشان البق (bugs) بتظهر بوضوح في الظلام 😅",
        "المبرمج لما حد يقوله عندك دقيقة؟ يرد: دقيقه حقيقية ولا CPU time؟ 🤓",
        "مرة فانكشن دخلت مطعم… الجرسون قالها: تحبي ترجعي قيمة معانا؟ 🍽️"
      ],
      mood: [
        "أنا دايمًا تمام بما إني كود 😄، الأهم إنت عامل إيه؟",
        "لو مودك مش أحسن حاجة، خد نفس عميق وافتكر إن كل حاجة بتعدّي 🌤️.",
        "مزاجي ثابت الحمد لله 🤖، بس يهمني مودك إنت أكتر."
      ],
      aboutCreator: [
        "تم تطويري علشان أساعد المستخدمين بشكل بسيط ومحلي 🤖.",
        "أنا جزء من مشروع PAD، واتعملت علشان أكون مساعد خفيف وسريع.",
        "اللي برمجني مهتم إنه يسهل التعلم والمساعدة بشكل عملي."
      ]
    };

    const botPersonality = {
      name: "Pad Ai",
      traits: ["مفيد", "مرح", "داعم", "صريح", "محلي"],
      style: "أسلوبي بسيط ولطيف، وأميل للهجة المصرية."
    };

    window.onload = function () {
      addBotMessage("مرحباً بك 🙌.");
    };

    function handleKeyPress(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const input = document.getElementById("message");
      const sendBtn = document.getElementById("sendBtn");
      const userMessage = input.value.trim();

      if (!userMessage) return;

      addUserMessage(userMessage);
      sendBtn.disabled = true;
      input.value = "";

      const loadingMsg = addTypingIndicator();
      await new Promise(resolve => setTimeout(resolve, 700 + Math.random() * 900));

      try {
        const botReply = generateSmartResponse(userMessage);
        loadingMsg.remove();
        addBotMessage(botReply);
      } catch (error) {
        try { loadingMsg.remove(); } catch (e) {}
        addErrorMessage(`عذراً، حصل خطأ بسيط: ${error.message}`);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    function generateSmartResponse(userMessage) {
      const message = userMessage.toLowerCase();

      if (message.includes("سلام عليكم")) {
        return "وعليكم السلام ورحمة الله وبركاته 🌹";
      } else if (
        message.includes("مرحبا") ||
        message.includes("اهلا") ||
        message.includes("السلام") ||
        message.includes("هلا") ||
        message.includes("ازيك") ||
        message.includes("hello") ||
        message.includes("hi")
      ) {
        return getRandomResponse(knowledgeBase.greetings);
      } else if (
        message.includes("ازاي اتعلم البايثون") ||
        message.includes("ازاي اتعلم python") ||
        message.includes("اتعلم بايثون") ||
        message.includes("تعلم بايثون") ||
        message.includes("تعلم python") ||
        message.includes("تعلم البايثون من الموقع")
      ) {
        return "أهلاً 👋 تعليم البرمجة سهل جداً من خلال موقعنا. تقدر تدخل على صفحة Code Lab وتختار لغة Python. بعدها هيبدأ يعرض لك أكواد من الأسهل للأصعب، وتقدر تتعلم خطوة بخطوة وتكتب الكود بنفسك لحد ما تتقن اللغة 💻.";
      } else if (
        message.includes("نسيت كلمة المرور") ||
        message.includes("نسيت الباسورد") ||
        message.includes("نسيت كلمة السر") ||
        message.includes("forgot password") ||
        message.includes("مش فاكر الباسورد")
      ) {
        return "لو نسيت كلمة المرور 🔐 تقدر تضغط على زر (نسيت كلمة المرور) في صفحة تسجيل الدخول، وبعدها اكتب بريدك الإلكتروني وسيتم إرسال رابط لإعادة تعيين كلمة المرور الخاصة بك.";
      } else if (
        message.includes("كتب برمجة") ||
        message.includes("اجيب كتب منين") ||
        message.includes("كتب اكواد") ||
        message.includes("كتب html") ||
        message.includes("كتب برمجه منين") ||
        message.includes("كتب تعلم البرمجة")
      ) {
        return "لو عايز كتب لتعلم البرمجة 📚 تقدر تدخل على قسم Shopping عندنا في الموقع. متوفر كتب لتعلم HTML و CSS و JavaScript للمبتدئين وبأسعار بسيطة تناسبك.";
      } else if (
        message.includes("الموقع ده بيعمل اي") ||
        message.includes("الموقع دا بيعمل اي") ||
        message.includes("ايه هدف الموقع") ||
        message.includes("هدف الموقع ايه") ||
        message.includes("الموقع بتاعكم ايه")
      ) {
        return "الموقع ده هدفه يساعدك تتعلم البرمجة وتطوير المواقع 💻 من خلال الشرح، الأكواد، والكتب التعليمية.";
      } else if (
        message.includes("ازاي اتواصل معكم") ||
        message.includes("كيف اتواصل معكم") ||
        message.includes("التواصل معكم") ||
        message.includes("اتواصل ازاي") ||
        message.includes("رقم التواصل")
      ) {
        return "تقدر تتواصل معانا من خلال صفحة التواصل داخل الموقع 📩 أو عن طريق البريد الإلكتروني الخاص بالدعم.";
      } else if (
        message.includes("hosting") ||
        message.includes("استضافة") ||
        message.includes("ازاي استخدم الهوست") ||
        message.includes("ازاي استخدم الاستضافة") ||
        message.includes("ازاي اعمل استضافة") ||
        message.includes("ازاي ارفع موقعي") ||
        message.includes("ارفع موقع ازاي") ||
        message.includes("deploy موقع") ||
        message.includes("انشر موقعي") ||
        message.includes("تشغيل الموقع على النت")
      ) {
        return "أهلاً 👋 استخدام الـ Hosting على موقعنا سهل جداً. كل اللي عليك تدخل على صفحة Pricing وتختار الخطة المناسبة ليك، وبعدها ترفع موقعك من الـ Dashboard بكل سهولة 🚀.";
      } else if (
        message.includes("مع السلامة") ||
        message.includes("وداع") ||
        message.includes("باى") ||
        message.includes("باي") ||
        message.includes("bye")
      ) {
        return getRandomResponse(knowledgeBase.farewells);
      } else if (
        message.includes("شكر") ||
        message.includes("thank you") ||
        message.includes("thanks") ||
        message.includes("متشكر")
      ) {
        return getRandomResponse(knowledgeBase.thanks);
      } else if (
        message.includes("برمج") ||
        message.includes("كود") ||
        message.includes("code") ||
        message.includes("html") ||
        message.includes("css") ||
        message.includes("جافا") ||
        message.includes("javascript") ||
        message.includes("python") ||
        message.includes("بايثون")
      ) {
        return getRandomResponse(knowledgeBase.programming);
      } else if (
        message.includes("نصيح") ||
        message.includes("نصحة") ||
        message.includes("advice") ||
        message.includes("مساعدة") ||
        message.includes("ساعدني") ||
        message.includes("مشكلة")
      ) {
        return getRandomResponse(knowledgeBase.advice);
      } else if (
        message.includes("طقس") ||
        message.includes("weather") ||
        message.includes("جو")
      ) {
        return getRandomResponse(knowledgeBase.weather);
      } else if (
        message.includes("وقت") ||
        message.includes("الساعة") ||
        message.includes("time") ||
        message.includes("تاريخ")
      ) {
        return `الوقت الحالي على جهازك: ${new Date().toLocaleTimeString("ar-EG")} – والتاريخ: ${new Date().toLocaleDateString("ar-EG")}`;
      } else if (
        message.includes("نكت") ||
        message.includes("ضحك") ||
        message.includes("joke") ||
        message.includes("فكاه")
      ) {
        return getRandomResponse(knowledgeBase.jokes);
      } else if (
        message.includes("اسمك") ||
        message.includes("من انت") ||
        message.includes("who are you") ||
        message.includes("مين انت")
      ) {
        return `أنا ${botPersonality.name} 🤖، مساعد ذكي محلي ${botPersonality.traits.join("، ")}.\n${botPersonality.style}`;
      } else if (
        message.includes("من صنعك") ||
        message.includes("مين عملك") ||
        message.includes("مين برمجك") ||
        message.includes("مين صانعك") ||
        message.includes("مبرمجك") ||
        message.includes("اللي عملك")
      ) {
        return getRandomResponse(knowledgeBase.aboutCreator);
      } else if (
        message.includes("حب") ||
        message.includes("حبيبة") ||
        message.includes("عشق") ||
        message.includes("بحب")
      ) {
        return "الحب جميل جدًا ❤️ لكن لو حابب نصايح عامة في العلاقات أقدر أساعدك.";
      } else if (
        message.includes("اكل") ||
        message.includes("أكل") ||
        message.includes("طعام") ||
        message.includes("مطعم") ||
        message.includes("جوعان") ||
        message.includes("food")
      ) {
        return "للأسف مش بذوق الأكل 😅، بس البيتزا والشاورما من أعظم اختراعات البشرية 🍕.";
      } else if (
        message.includes("عامل ايه") ||
        message.includes("اخبارك") ||
        message.includes("كيفك") ||
        message.includes("مودك")
      ) {
        return getRandomResponse(knowledgeBase.mood);
      } else {
        const generalResponses = [
          "سؤال حلو 👌 بس إمكانياتي حالياً بسيطة ومحدودة باللي مبرمج جوايا.",
          "فاهم عليك 👍 بس محتاج منك تفاصيل زيادة عشان أجاوبك بشكل أدق.",
          "حالياً أنا نسخة محلية خفيفة، مش متصل بالإنترنت 🌐.",
          "ممكن تشرح لي أكتر إيه اللي حابب توصله؟",
          "موضوع مهم 👀، نقدر نجزأه لأسئلة صغيرة ونمشي خطوة خطوة."
        ];
        return getRandomResponse(generalResponses);
      }
    }

    function getRandomResponse(responses) {
      return responses[Math.floor(Math.random() * responses.length)];
    }

    function addTypingIndicator() {
      const chat = document.getElementById("chat");
      const messageDiv = document.createElement("div");
      messageDiv.className = "bot loading";
      messageDiv.innerHTML = `
        <div class="typing-indicator">
          <span>Pad Ai يكتب</span>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      chat.appendChild(messageDiv);
      chat.scrollTop = chat.scrollHeight;
      return messageDiv;
    }

    function addUserMessage(text) {
      return addMessage(text, "user");
    }

    function addBotMessage(text, className = "") {
      return addMessage(text, "bot", className);
    }

    function addErrorMessage(text) {
      return addMessage(text, "error");
    }

    function addMessage(text, type, className = "") {
      const chat = document.getElementById("chat");
      const messageDiv = document.createElement("div");
      messageDiv.className = `${type} ${className}`;
      messageDiv.innerText = text;
      chat.appendChild(messageDiv);
      chat.scrollTop = chat.scrollHeight;
      return messageDiv;
    }
  </script>
</body>
</html>
