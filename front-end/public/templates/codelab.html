<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Lab - معمل البرمجة | PAD</title>
    
    <!-- مكتبات CodeMirror الأساسية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    
    <!-- لغات CodeMirror -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root {
            --bg-main: #070b17; --bg-panel: #0f1933; --text-light: #eaf0ff;
            --text-muted: #8fa5de; --primary: #1b74e4; --success: #22c55e;
            --danger: #ef4444; --border: rgba(145,175,255,0.1);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-main); margin: 0; padding: 0; color: var(--text-light); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* الهيدر */
        .header { background: rgba(15, 25, 51, 0.8); border-bottom: 1px solid var(--border); padding: 0 30px; display: flex; align-items: center; justify-content: space-between; height: 70px; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 30px; }
        .header-title h1 { margin: 0; font-size: 20px; color: #fff;}
        .header-title p { margin: 0; font-size: 12px; color: var(--text-muted);}

        /* أزرار اختيار اللغة */
        .lang-tabs { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; border: 1px solid var(--border);}
        .lang-btn { background: transparent; color: var(--text-muted); border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .lang-btn:hover { color: #fff; }
        .lang-btn.active { background: var(--primary); color: #fff; box-shadow: 0 0 15px rgba(27, 116, 228, 0.4);}
        
        /* زر العودة مربوط بـ Flask */
        .back-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); transition: 0.3s; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; transform: translateX(-3px);}
        
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* القائمة الجانبية للتحديات */
        .sidebar { width: 300px; background: var(--bg-panel); border-left: 1px solid var(--border); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .sidebar h3 { margin: 0 0 10px 0; font-size: 16px; color: #fff; border-bottom: 1px solid var(--border); padding-bottom: 10px;}

        .challenge-item { background: rgba(255, 255, 255, 0.03); padding: 12px; border-radius: 10px; cursor: pointer; transition: all 0.3s; border: 1px solid transparent;}
        .challenge-item:hover { background: rgba(255, 255, 255, 0.08); }
        .challenge-item.active { background: rgba(27, 116, 228, 0.15); border-color: var(--primary); box-shadow: 0 0 10px rgba(27, 116, 228, 0.2);}
        .challenge-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #fff;}
        .difficulty { font-size: 10px; padding: 3px 8px; border-radius: 20px; color: #fff; font-weight: bold;}
        .diff-beginner { background: var(--success); }
        .diff-intermediate { background: #eab308; }

        /* تنسيق إحصائيات المستخدم */
        .user-stats {
            margin-top: 20px;
            padding: 12px;
            background: rgba(34,197,94,0.1);
            border-radius: 12px;
            border: 1px solid rgba(34,197,94,0.2);
        }
        .stats-badge {
            font-size: 12px;
            color: #86efac;
            text-align: center;
        }
        .stats-badge i {
            margin: 0 4px;
        }

        /* منطقة المحرر */
        .codelab-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .codelab-content::-webkit-scrollbar { width: 6px; }
        .codelab-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .challenge-info { background: var(--bg-panel); padding: 20px; border-radius: 16px; border: 1px solid var(--border);}
        .challenge-info h2 { margin: 0 0 10px 0; color: #fff; font-size: 20px;}
        .challenge-info p { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 0;}
        .sample-box { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 10px; border: 1px dashed var(--border); display: flex; gap: 20px; margin-top: 15px;}
        .sample-col { flex: 1; }
        .sample-col strong { color: #fff; font-size: 13px; display: block; margin-bottom: 8px;}
        .sample-box pre { margin: 0; font-family: monospace; font-size: 14px; color: var(--success); direction: ltr; text-align: left; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 6px;}

        .editor-section { background: var(--bg-panel); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1;}
        .editor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .editor-header h3 { margin: 0; font-size: 15px; display: flex; align-items: center; gap: 8px;}
        
        .action-buttons { display: flex; gap: 10px; }
        
        /* الزرار السحري للذكاء الاصطناعي */
        .ai-btn { 
            background: linear-gradient(135deg, #a855f7, #6366f1); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
        .ai-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6); filter: brightness(1.1); animation: none;}

        .run-button { background: var(--success); color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 8px;}
        .run-button:hover { background: #16a34a; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);}

        .CodeMirror { height: 280px; border-radius: 10px; font-size: 15px; text-align: left; direction: ltr; border: 1px solid var(--border); padding: 10px 0;}
        
        /* نافذة المخرجات (Console) */
        .output-section { margin-top: 15px; display: flex; flex-direction: column; flex: 1;}
        .output-box { background: #000; color: #fff; padding: 15px; border-radius: 10px; min-height: 120px; font-family: monospace; font-size: 14px; direction: ltr; text-align: left; border: 1px solid var(--border); overflow-y: auto;}
        
        .html-preview-frame { width: 100%; height: 180px; background: #fff; border: 1px solid var(--border); border-radius: 10px; display: none; margin-top: 10px;}

        /* تنسيق رد الذكاء الاصطناعي */
        .ai-response { background: rgba(168, 85, 247, 0.1); border-left: 4px solid #a855f7; padding: 15px; border-radius: 0 8px 8px 0; margin-top: 10px; color: #eaf0ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; direction: rtl; text-align: right;}
        .ai-response strong { color: #a855f7; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOutDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        .solved-badge {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-title">
            <h1>🧪 PAD Code Lab</h1>
            <p>Interactive Coding Workspace</p>
        </div>
        <div class="lang-tabs">
            <button class="lang-btn active" onclick="switchLanguage('python')" id="tab-python"><i class="fa-brands fa-python"></i> Python</button>
            <button class="lang-btn" onclick="switchLanguage('web')" id="tab-web"><i class="fa-brands fa-html5"></i> HTML/CSS</button>
        </div>
    </div>
    <!-- زرار الرجوع المربوط بـ Flask -->
    <a href="{{ url_for('home_page') }}" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة لـ PAD</a>
</div>

<div class="main-container">
    <div class="sidebar" id="sidebar">
        <h3 id="sidebar-title">📋 تحديات Python</h3>
        <div id="challenges-list"></div>
        <div class="user-stats" id="userStats"></div>
    </div>

    <div class="codelab-content">
        <div class="challenge-info">
            <h2 id="current-title">جاري التحميل...</h2>
            <p id="current-desc"></p>
            <div class="sample-box">
                <div class="sample-col"><strong>📥 المدخلات أو الشروط:</strong><pre id="current-input">-</pre></div>
                <div class="sample-col"><strong>📤 المخرجات المتوقعة:</strong><pre id="current-output">-</pre></div>
            </div>
        </div>

        <div class="editor-section">
            <div class="editor-header">
                <h3 id="editor-title"><i class="fa-brands fa-python" style="color:#fbbf24;"></i> محرر بايثون</h3>
                <div class="action-buttons">
                    <button onclick="askAI()" class="ai-btn" title="اطلب المساعدة من الذكاء الاصطناعي">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> فحص بالذكاء الاصطناعي
                    </button>
                    <button onclick="checkCode()" class="run-button"><i class="fa-solid fa-play"></i> تشغيل الكود</button>
                </div>
            </div>
            
            <textarea id="code-editor"></textarea>
            
            <div class="output-section">
                <h3 style="margin: 0 0 5px 0; font-size: 14px; color: var(--text-muted);">📊 نافذة المخرجات (Console)</h3>
                <div class="output-box" id="output-box">
                    <span style="color: #666;">اضغط على "تشغيل الكود" أو "فحص بالذكاء الاصطناعي"...</span>
                </div>
                <iframe id="html-preview" class="html-preview-frame" sandbox="allow-scripts"></iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // بيانات التحديات (هتجي من API)
    // ==========================================
    let allChallenges = { python: [], web: [] };
    let currentLanguage = 'python';
    let currentChallengeId = null;
    let editor;
    let solvedChallenges = new Set();

    // ==========================================
    // تحميل التحديات من الخادم
    // ==========================================
    async function loadChallengesFromServer(language) {
        try {
            const response = await fetch(`/api/challenges?language=${language}`);
            const data = await response.json();
            
            if (data.success) {
                allChallenges[language] = data.challenges;
                
                solvedChallenges.clear();
                data.challenges.forEach(ch => {
                    if (ch.solved) solvedChallenges.add(ch.id);
                });
                
                return true;
            }
            return false;
        } catch (error) {
            console.error('Error loading challenges:', error);
            return false;
        }
    }

    // ==========================================
    // جلب starter code
    // ==========================================
    async function fetchStarterCode(challengeId) {
        try {
            const response = await fetch(`/api/challenges/${challengeId}/starter`);
            const data = await response.json();
            if (data.success && data.starter_code) {
                return data.starter_code;
            }
            return null;
        } catch (error) {
            console.error('Error fetching starter code:', error);
            return null;
        }
    }

    // ==========================================
    // عرض القائمة الجانبية
    // ==========================================
    async function renderSidebar() {
        const listDiv = document.getElementById('challenges-list');
        if (!listDiv) return;
        
        listDiv.innerHTML = '';
        const challenges = allChallenges[currentLanguage] || [];
        
        if (challenges.length === 0) {
            listDiv.innerHTML = '<div class="text-muted" style="padding: 20px; text-align: center;">لا توجد تحديات حالياً</div>';
            return;
        }
        
        for (const challenge of challenges) {
            const diffClass = challenge.difficulty === 'beginner' ? 'diff-beginner' : 'diff-intermediate';
            const solvedBadge = solvedChallenges.has(challenge.id) 
                ? '<span class="solved-badge" style="color:#22c55e; margin-right:8px;"><i class="fa-solid fa-check-circle"></i></span>' 
                : '';
            
            const div = document.createElement('div');
            div.className = `challenge-item ${challenge.id === currentChallengeId ? 'active' : ''}`;
            div.onclick = () => loadChallenge(challenge.id);
            div.innerHTML = `
                <div class="challenge-title">
                    ${solvedBadge}${escapeHtml(challenge.title)}
                </div>
                <span class="difficulty ${diffClass}">${challenge.difficulty === 'beginner' ? 'مبتدئ' : 'متوسط'}</span>
                <div style="font-size: 11px; color: #fbbf24; margin-top: 5px;">
                    <i class="fa-solid fa-star"></i> ${challenge.points} نقطة
                </div>
            `;
            listDiv.appendChild(div);
        }
    }

    // ==========================================
    // تحميل تحدي معين
    // ==========================================
    async function loadChallenge(id) {
        currentChallengeId = id;
        const challenge = allChallenges[currentLanguage].find(c => c.id === id);
        
        if (!challenge) return;
        
        document.getElementById('current-title').innerText = challenge.title;
        document.getElementById('current-desc').innerText = challenge.description;
        document.getElementById('current-input').innerText = challenge.sample_input || '-';
        document.getElementById('current-output').innerText = challenge.sample_output || '-';
        
        let starterCode = await fetchStarterCode(id);
        if (!starterCode) {
            starterCode = currentLanguage === 'python' 
                ? "# اكتب الكود هنا\n" 
                : "<!-- اكتب كود HTML/CSS هنا -->\n";
        }
        
        editor.setValue(starterCode);
        editor.clearHistory();
        
        document.getElementById('output-box').innerHTML = '<span style="color: #666;">في انتظار الكود...</span>';
        if (currentLanguage === 'web') document.getElementById('html-preview').srcdoc = "";
        
        await renderSidebar();
    }

    // ==========================================
    // تشغيل الكود والتحقق
    // ==========================================
    async function checkCode() {
        const code = editor.getValue().trim();
        const outputBox = document.getElementById('output-box');
        
        if (code === "" || code.startsWith("#") || code.startsWith("<!--")) {
            outputBox.innerHTML = `<div style="color:#ef4444;">❌ الرجاء كتابة الكود أولاً!</div>`;
            return;
        }
        
        outputBox.innerHTML = `<div style="color:#38bdf8;"><i class="fa-solid fa-spinner fa-spin"></i> جاري التشغيل...</div>`;
        
        try {
            const response = await fetch(`/api/challenges/${currentChallengeId}/submit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            });
            
            const result = await response.json();
            
            if (result.success) {
                if (result.is_correct) {
                    outputBox.innerHTML = `
                        <div style="color:#22c55e; background: rgba(34,197,94,0.1); padding: 15px; border-radius: 10px;">
                            <i class="fa-solid fa-check-circle"></i> ${result.message}
                        </div>
                        <div style="color:#fbbf24; margin-top: 10px; padding: 10px; background: rgba(251,191,36,0.1); border-radius: 8px;">
                            <strong>✨ النقاط: ${result.points_earned}</strong> | 
                            إجمالي النقاط: ${result.user_points} | 
                            المستوى: ${result.user_level}
                        </div>
                    `;
                    
                    solvedChallenges.add(currentChallengeId);
                    await renderSidebar();
                    updateUserStats();
                    showSuccessToast(`🎉 أحسنت! حصلت على ${result.points_earned} نقطة!`);
                    
                } else {
                    outputBox.innerHTML = `
                        <div style="color:#ef4444; background: rgba(239,68,68,0.1); padding: 15px; border-radius: 10px;">
                            <i class="fa-solid fa-xmark-circle"></i> ${result.message}
                        </div>
                        <div style="color:#fbbf24; margin-top: 10px; padding: 10px; background: rgba(251,191,36,0.1); border-radius: 8px;">
                            <strong>📤 المخرجات المتوقعة:</strong><br>
                            <pre style="background:#000; padding:8px; border-radius:6px; margin-top:5px; color:#86efac;">${escapeHtml(result.expected_output || '')}</pre>
                        </div>
                    `;
                }
            } else {
                if (result.already_completed) {
                    outputBox.innerHTML = `
                        <div style="color:#fbbf24; background: rgba(251,191,36,0.1); padding: 15px; border-radius: 10px;">
                            <i class="fa-solid fa-check-circle"></i> ${result.error}
                        </div>
                        <div style="margin-top: 10px;">
                            <button onclick="loadChallenge(${currentChallengeId})" style="background:#1b74e4; padding:8px 16px; border:none; border-radius:8px; color:white; cursor:pointer;">
                                🔄 جرب تحدياً آخر
                            </button>
                        </div>
                    `;
                } else {
                    outputBox.innerHTML = `<div style="color:#ef4444;">❌ خطأ: ${result.error}</div>`;
                }
            }
            
        } catch (error) {
            console.error('Error:', error);
            outputBox.innerHTML = `<div style="color:#ef4444;">❌ خطأ في الاتصال بالخادم. حاول مرة أخرى.</div>`;
        }
    }

    // ==========================================
    // تحديث إحصائيات المستخدم
    // ==========================================
    async function updateUserStats() {
        try {
            const response = await fetch('/api/user/stats');
            const data = await response.json();
            if (data.success) {
                const statsDiv = document.getElementById('userStats');
                if (statsDiv) {
                    statsDiv.innerHTML = `
                        <div class="stats-badge">
                            <i class="fa-solid fa-flask"></i> تم حل: ${data.labs_solved}
                            | <i class="fa-solid fa-star"></i> النقاط: ${data.points}
                            | <i class="fa-solid fa-chart-line"></i> المستوى: ${data.level}
                        </div>
                    `;
                }
            }
        } catch (error) {
            console.error('Error updating stats:', error);
        }
    }

    // ==========================================
    // عرض تنبيه نجاح
    // ==========================================
    function showSuccessToast(message) {
        const toast = document.createElement('div');
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.background = '#22c55e';
        toast.style.color = 'white';
        toast.style.padding = '12px 24px';
        toast.style.borderRadius = '8px';
        toast.style.zIndex = '9999';
        toast.style.animation = 'fadeInUp 0.3s ease';
        toast.innerHTML = `<i class="fa-solid fa-check-circle"></i> ${message}`;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'fadeOutDown 0.3s ease';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ==========================================
    // تبديل اللغة
    // ==========================================
    async function switchLanguage(lang) {
        currentLanguage = lang;
        
        document.getElementById('tab-python').classList.remove('active');
        document.getElementById('tab-web').classList.remove('active');
        document.getElementById(`tab-${lang}`).classList.add('active');
        
        await loadLanguageEnvironment(lang);
    }

    // ==========================================
    // تحميل بيئة اللغة
    // ==========================================
    async function loadLanguageEnvironment(lang) {
        await loadChallengesFromServer(lang);
        
        const challenges = allChallenges[lang] || [];
        
        if (lang === 'python') {
            document.getElementById('sidebar-title').innerText = "📋 تحديات Python";
            document.getElementById('editor-title').innerHTML = '<i class="fa-brands fa-python" style="color:#fbbf24;"></i> محرر بايثون';
            editor.setOption("mode", "python");
            document.getElementById('html-preview').style.display = 'none';
        } else {
            document.getElementById('sidebar-title').innerText = "📋 تحديات HTML/CSS";
            document.getElementById('editor-title').innerHTML = '<i class="fa-brands fa-html5" style="color:#e34f26;"></i> محرر الويب';
            editor.setOption("mode", "htmlmixed");
            document.getElementById('html-preview').style.display = 'block';
        }
        
        await renderSidebar();
        await updateUserStats();
        
        if (challenges.length > 0) {
            await loadChallenge(challenges[0].id);
        }
    }

    // ==========================================
    // طلب مساعدة الذكاء الاصطناعي
    // ==========================================
    function askAI() {
        const code = editor.getValue().trim();
        const outputBox = document.getElementById('output-box');
        const challenge = allChallenges[currentLanguage]?.find(c => c.id === currentChallengeId);
        
        if (code === "" || code.startsWith("#") || code.startsWith("<!--")) {
            outputBox.innerHTML = `<span style="color:#ef4444;">❌ اكتب الكود أولاً عشان أقدر أساعدك!</span>`;
            return;
        }

        outputBox.innerHTML = `<span style="color:#a855f7;"><i class="fa-solid fa-spinner fa-spin"></i> PAD AI بيحلل الكود...</span>`;

        setTimeout(() => {
            let aiFeedback = "";
            const codeLower = code.toLowerCase();
            
            if (currentLanguage === 'python') {
                if (!codeLower.includes("print") && challenge?.sample_output) {
                    aiFeedback = "💡 تلميح: يبدو أنك نسيت استخدام `print()` لعرض النتيجة. في بايثون، لازم تستخدم `print()` عشان تشوف المخرجات.";
                } else if (code.includes("print") && challenge?.sample_output && !code.includes(challenge.sample_output.toLowerCase())) {
                    aiFeedback = "🔍 الكود فيه `print()` لكن النص المطبوع مختلف عن المطلوب. تأكد من طباعة النص المطلوب بالضبط.";
                } else {
                    aiFeedback = "👍 الكود يبدو جيداً من ناحية الصياغة! جرب تشغيله وشوف النتيجة. لو في خطأ، راجع المخرجات المتوقعة.";
                }
            } else {
                if (!code.includes("<") || !code.includes(">")) {
                    aiFeedback = "💡 تلميح: أكواد HTML لازم تكون داخل أقواس زاوية زي `<tag>`. الكود الحالي مش كامل.";
                } else {
                    aiFeedback = "🎨 الكود يبدو سليماً! شغله وشوف المعاينة. لو مش شغال، تأكد إنك استخدمت التاجات المطلوبة.";
                }
            }
            
            outputBox.innerHTML = `
                <div style="background: rgba(168,85,247,0.1); border-right: 4px solid #a855f7; padding: 15px; border-radius: 8px;">
                    <strong style="color:#a855f7;"><i class="fa-solid fa-robot"></i> PAD AI:</strong><br>
                    ${aiFeedback}
                </div>
            `;
        }, 1000);
    }

    // ==========================================
    // دوال مساعدة
    // ==========================================
    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    // ==========================================
    // تهيئة الصفحة
    // ==========================================
    window.onload = async function() {
        editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
            mode: "python",
            theme: "dracula",
            lineNumbers: true,
            indentUnit: 4,
            matchBrackets: true,
            lineWrapping: true
        });
        
        await loadLanguageEnvironment('python');
    };
</script>
